<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shinjuku Cinema - Book Tickets</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @import url("https://fonts.googleapis.com/css2?family=Yusei+Magic&family=Roboto:wght@300;400;500;700&display=swap");

    body {
      font-family: "Roboto", sans-serif;
      background: radial-gradient(circle at top, #1a0000, #0b0b0f);
      color: #fff;
    }

    .jp-bg {
      background-image: url("https://www.transparenttextures.com/patterns/asanoha.png");
      opacity: 0.08;
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .page {
      display: none;
    }
    .page.active {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .btn-primary {
      background: linear-gradient(135deg, #e60023, #ff4d6d);
      transition: 0.3s;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
    }

    input {
      background: #14141a;
      border: 1px solid #2a2a35;
    }
  </style>
</head>

<body>
<div class="jp-bg"></div>

<!-- ================= AUTH PAGE ================= -->
<div id="authPage" class="page active">
  <div class="w-full max-w-md p-6 bg-[#111118]/90 rounded-2xl border border-[#2a2a35]">

    <div class="text-center mb-6">
      <h1 class="text-3xl font-bold" style="font-family: Yusei Magic">🎌 Shinjuku Cinema</h1>
      <p class="text-gray-400 text-sm">Tokyo Inspired Ticket Booking</p>
    </div>

    <!-- Tabs -->
    <div class="flex gap-2 mb-6">
      <button id="loginTab" class="flex-1 py-2 rounded-lg bg-[#e60023]">Login</button>
      <button id="signupTab" class="flex-1 py-2 rounded-lg bg-[#222]">Signup</button>
    </div>

    <!-- LOGIN -->
    <form id="loginForm">
      <input id="loginUsername" type="text" placeholder="Username / Email" class="w-full p-3 rounded-lg mb-3" required />
      <input id="loginPassword" type="password" placeholder="Password" class="w-full p-3 rounded-lg mb-4" required />

      <button class="btn-primary w-full p-3 rounded-lg font-semibold">Enter Cinema</button>
    </form>

    <!-- SIGNUP -->
    <form id="signupForm" class="hidden">
      <input id="signupFirstName" placeholder="First Name" class="w-full p-3 rounded-lg mb-3" required />
      <input id="signupLastName" placeholder="Last Name" class="w-full p-3 rounded-lg mb-3" required />
      <input id="signupUsername" placeholder="Username" class="w-full p-3 rounded-lg mb-3" required />
      <input id="signupEmail" type="email" placeholder="Email" class="w-full p-3 rounded-lg mb-3" required />
      <input id="signupPassword" type="password" placeholder="Password" class="w-full p-3 rounded-lg mb-4" required />

      <button class="btn-primary w-full p-3 rounded-lg font-semibold">Create Account</button>

      <p id="signupMessage" class="text-sm mt-3 text-center"></p>
    </form>

    <!-- FORGOT -->
    <form id="forgotForm" class="hidden">
      <input id="forgotEmail" type="email" placeholder="Enter email" class="w-full p-3 rounded-lg mb-3" required />
      <button class="btn-primary w-full p-3 rounded-lg font-semibold">Send Reset Link</button>
    </form>

  </div>
</div>

<!-- ================= BOOKING PAGE ================= -->
<div id="bookingPage" class="page">
  <div class="w-full max-w-6xl p-6">

    <div class="flex justify-between mb-8">
      <h1 class="text-2xl font-bold">🎬 Shinjuku Cinema</h1>
      <button id="logoutBtn" class="bg-gray-800 px-4 py-2 rounded-lg">Logout</button>
    </div>

    <div class="text-center mb-8">
      <h2 class="text-4xl font-bold text-[#ff4d6d]">Dhurandhar: The Revenge</h2>
    </div>

    <div class="flex justify-center">
      <div id="seatGrid" class="grid grid-cols-8 gap-3"></div>
    </div>

    <div class="mt-10 bg-[#111118] p-5 rounded-xl">
      <h2 class="text-lg font-bold mb-3">My Bookings</h2>
      <div id="bookingsList"></div>
    </div>

  </div>
</div>

<script>
let currentUser = null;

/* ================= DOM FIX ================= */
const seatGrid = document.getElementById("seatGrid");
const bookingsList = document.getElementById("bookingsList");
const logoutBtn = document.getElementById("logoutBtn");

/* ================= PAGE SWITCH ================= */
function showPage(page) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(page + "Page").classList.add("active");
}

/* ================= TAB SWITCH ================= */
document.getElementById("loginTab").onclick = () => {
  signupForm.classList.add("hidden");
  loginForm.classList.remove("hidden");
};

document.getElementById("signupTab").onclick = () => {
  loginForm.classList.add("hidden");
  signupForm.classList.remove("hidden");
};

/* ================= SIGNUP ================= */
document.getElementById("signupForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const res = await fetch("/api/signup", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      first_name: signupFirstName.value,
      last_name: signupLastName.value,
      username: signupUsername.value,
      email: signupEmail.value,
      password: signupPassword.value
    })
  });

  const msg = document.getElementById("signupMessage");

  if (res.ok) {
    msg.innerText = "Account created 🎌 Please login";
    msg.style.color = "#4ade80";

    e.target.reset();
  } else {
    msg.innerText = "Signup failed ❌";
    msg.style.color = "red";
  }

  setTimeout(() => msg.innerText = "", 3000);
});

/* ================= LOGIN ================= */
document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const res = await fetch("/api/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    credentials: "include",
    body: JSON.stringify({
      username: loginUsername.value,
      password: loginPassword.value
    })
  });

  const data = await res.json();

  if (data.user) {
    currentUser = data.user;
    showPage("booking");
    loadSeats();
    loadBookings();
  }
});

/* ================= LOGOUT ================= */
logoutBtn?.addEventListener("click", async () => {
  await fetch("/api/logout", { method:"POST", credentials:"include" });
  showPage("auth");
});

/* ================= SEATS ================= */
async function loadSeats() {
  const res = await fetch("/api/seats", { credentials:"include" });
  const seats = await res.json();

  seatGrid.innerHTML = "";

  seats.forEach(seat => {
    const div = document.createElement("div");

    div.className = "seat " + (seat.isbooked ? "booked" : "available");

    div.innerText = seat.row_label 
      ? seat.row_label + seat.seat_number 
      : seat.id;

    if (!seat.isbooked) {
      div.onclick = async () => {
        await fetch(`/api/book/${seat.id}`, {
          method:"PUT",
          credentials:"include"
        });

        loadSeats();
        loadBookings();
      };
    }

    seatGrid.appendChild(div);
  });
}

/* ================= BOOKINGS ================= */
async function loadBookings() {
  const res = await fetch("/api/my-bookings", { credentials:"include" });
  const data = await res.json();

  bookingsList.innerHTML = data.map(b => `
    <div class="p-2 bg-[#1b1b24] rounded-lg mb-2">
      Seat ${b.id} - ${b.booked_at ? new Date(b.booked_at).toLocaleString() : ""}
    </div>
  `).join("");
}

/* INIT */
showPage("auth");
</script>

</body>
</html>
